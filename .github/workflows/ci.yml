name: cusp test

on: [push]

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install scons
      run: |
        python -m pip install --upgrade pip
        python -m pip install scons
