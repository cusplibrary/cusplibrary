name: cusp test

on: [push]

jobs:
  Test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [omp, tbb]
        include:
          - backend: omp
            libs: ""
            env_prefix: "OMP_NUM_THREADS=4"
          - backend: tbb
            libs: "libtbb-dev"
            env_prefix: ""
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install scons
      run: |
        python -m pip install --upgrade pip
        python -m pip install scons

    - name: Install dependencies
      run: sudo apt-get install -y liblapacke-dev libopenblas-dev ${{ matrix.libs }}

    - name: Checkout CCCL
      uses: actions/checkout@v4
      with:
        repository: NVIDIA/cccl
        ref: v3.1.4
        path: cccl

    - name: Build tests
      working-directory: testing
      run: |
        CCCL_PATH=${{ github.workspace }}/cccl \
        THRUST_PATH=${{ github.workspace }}/cccl/thrust \
        scons compiler=gcc backend=${{ matrix.backend }} deviceblas=cusp mode=release -j $(nproc)

    - name: Run tests
      working-directory: testing/device_${{ matrix.backend }}_release
      run: ${{ matrix.env_prefix }} ./test

  Coverage:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install scons
      run: |
        python -m pip install --upgrade pip
        python -m pip install scons

    - name: Install dependencies
      run: sudo apt-get install -y liblapacke-dev libopenblas-dev lcov

    - name: Checkout CCCL
      uses: actions/checkout@v4
      with:
        repository: NVIDIA/cccl
        ref: v3.1.4
        path: cccl

    - name: Build tests (coverage)
      working-directory: testing
      run: |
        CCCL_PATH=${{ github.workspace }}/cccl \
        THRUST_PATH=${{ github.workspace }}/cccl/thrust \
        scons compiler=gcc backend=omp deviceblas=cusp mode=coverage -j $(nproc)

    - name: Run tests (coverage)
      working-directory: testing/device_omp_coverage
      run: OMP_NUM_THREADS=4 ./test

    - name: Collect coverage
      working-directory: testing
      run: |
        lcov --capture \
             --directory device_omp_coverage \
             --output-file coverage.info
        lcov --extract coverage.info '*/cusplibrary/cusp/*' \
             --output-file coverage_filtered.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: testing/coverage_filtered.info
        token: ${{ secrets.CODECOV_TOKEN }}
